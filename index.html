<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沙盘仪表盘 - 产品矩阵分析工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #1e40af 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 2rem;
        }
        
        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }
        
        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 3rem;
            font-weight: 300;
        }
        
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .card:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .card-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        
        .card-desc {
            font-size: 0.95rem;
            opacity: 0.85;
            line-height: 1.6;
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        
        .feature {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .footer {
            font-size: 0.85rem;
            opacity: 0.7;
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .cards { grid-template-columns: 1fr; }
            .features { gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-th"></i>
        </div>
        
        <h1>沙盘仪表盘</h1>
        <p class="subtitle">产品矩阵可视化分析工具</p>
        
        <div class="cards">
            <a href="./沙盘仪表盘-带分享.html" class="card">
                <div class="card-icon">
                    <i class="fas fa-edit"></i>
                </div>
                <div class="card-title">编辑沙盘</div>
                <div class="card-desc">
                    上传 Excel 数据，生成销量-价格矩阵沙盘，<br>
                    支持数据筛选、分析和分享
                </div>
            </a>
            
            <a href="./沙盘查看.html" class="card">
                <div class="card-icon">
                    <i class="fas fa-eye"></i>
                </div>
                <div class="card-title">查看沙盘</div>
                <div class="card-desc">
                    打开分享的链接或导入 JSON 文件，<br>
                    查看已分享的沙盘数据
                </div>
            </a>
        </div>
        
        <div class="features">
            <div class="feature">
                <i class="fas fa-file-excel"></i>
                <span>Excel 导入</span>
            </div>
            <div class="feature">
                <i class="fas fa-chart-scatter"></i>
                <span>矩阵分析</span>
            </div>
            <div class="feature">
                <i class="fas fa-share-alt"></i>
                <span>跨设备分享</span>
            </div>
        </div>
        
        <div class="footer">
            版本 v1.1.0 | 支持京东竞品沙盘 & 电商新品跟踪
        </div>
    </div>
</body>
</html>
